name: tickify
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  intl: ^0.19.0
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  supabase_flutter: ^2.8.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  http: ^1.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#000000" # android adaptive icon background color
  adaptive_icon_foreground: "assets/logo/app_logo.png" # android adaptive icon foreground image

assets:
    - assets/logo/
    - assets/fonts/
